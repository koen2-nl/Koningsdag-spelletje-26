<!DOCTYPE html>
<html>
<head>
  <title>🎉 Klik Spel Deluxe</title>

  <style>
    body {
      text-align: center;
      font-family: "Comic Sans MS", cursive;
      background: linear-gradient(orange, gold);
      color: white;
      overflow: hidden;
    }

    h1 {
      animation: bounce 1s infinite alternate;
    }

    @keyframes bounce {
      from { transform: translateY(0px); }
      to { transform: translateY(-10px); }
    }

    button {
      font-size: 30px;
      padding: 20px 40px;
      border-radius: 30px;
      border: none;
      margin-top: 20px;
      background: white;
      color: orange;
      cursor: pointer;
      animation: pulse 1.5s infinite;
      box-shadow: 0 0 20px rgba(255,255,255,0.8);
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    #score, #time {
      font-size: 24px;
      margin-top: 15px;
    }

    .confetti {
      position: absolute;
      width: 10px;
      height: 10px;
      background: red;
      top: 0;
      animation: fall 3s linear forwards;
    }

    @keyframes fall {
      to {
        transform: translateY(100vh) rotate(720deg);
      }
    }
  </style>
</head>

<body>

<h1>🎯 Klik zo snel mogelijk!</h1>
<p>Klik 10 keer zo snel als je kan!</p>

<button onclick="clickGame()">KLIK!</button>

<p id="score">0 / 10</p>
<p id="time"></p>

<script>
let clicks = 0;
let startTime;

function clickGame() {
  if (clicks === 0) {
    startTime = new Date().getTime();
  }

  clicks++;
  document.getElementById("score").innerText = clicks + " / 10";

  if (clicks === 10) {
    let endTime = new Date().getTime();
    let time = ((endTime - startTime) / 1000).toFixed(2);

    document.getElementById("time").innerText = "⏱️ Tijd: " + time + " sec";

    launchConfetti();

    let name = prompt("Wat is je naam?");
    let scores = JSON.parse(localStorage.getItem("scores")) || [];

    scores.push({ name: name, time: time });
    localStorage.setItem("scores", JSON.stringify(scores));

    setTimeout(() => {
      window.location.href = "score.html";
    }, 2500);
  }
}

function launchConfetti() {
  for (let i = 0; i < 100; i++) {
    let confetti = document.createElement("div");
    confetti.className = "confetti";

    confetti.style.left = Math.random() * 100 + "vw";
    confetti.style.background = ["red", "yellow", "blue", "green"][Math.floor(Math.random()*4)];

    document.body.appendChild(confetti);

    setTimeout(() => confetti.remove(), 3000);
  }
}
</script>

</body>
</html>

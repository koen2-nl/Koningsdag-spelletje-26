<!DOCTYPE html>
<html>
<head>
  <title>🎉 Draai & Win! 🎉</title>
  <style>
    body {
      text-align: center;
      font-family: "Comic Sans MS", cursive;
      background: linear-gradient(to bottom, orange, yellow);
      color: white;
    }

    h1 {
      font-size: 40px;
    }

    #wheel {
      margin: 30px auto;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      border: 8px dashed white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      background: conic-gradient(
        #ff4d4d 0% 45%,
        #ff9933 45% 90%,
        #66ff66 90% 100%
      );
      transition: transform 3s ease-out;
    }

    button {
      padding: 15px 30px;
      font-size: 20px;
      border: none;
      border-radius: 20px;
      background: white;
      color: orange;
      cursor: pointer;
      box-shadow: 0 5px 0 #cc8400;
    }

    button:active {
      box-shadow: none;
      transform: translateY(5px);
    }

    #result {
      font-size: 24px;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<h1>🎡 Draai & Win! 🎡</h1>
<p>Druk op de knop en kijk of jij geluk hebt! 🍀</p>

<div id="wheel">🎁</div>

<button onclick="spin()">🎯 DRAAI!</button>

<p id="result"></p>

<script>
function spin() {
  let wheel = document.getElementById("wheel");

  let rotation = 1440 + Math.random() * 360;
  wheel.style.transform = "rotate(" + rotation + "deg)";

  // kleine winkans (3%)
  let win = Math.random() < 0.03;

  setTimeout(() => {
    if (win) {
      document.getElementById("result").innerText = "🎉 YES! Jij hebt gewonnen! 🥳";
    } else {
      document.getElementById("result").innerText = "😢 Oeps! Probeer nog eens!";
    }
  }, 3000);
}
</script>

</body>
</html>
